# version: '3.8'

services:
  # The Advanced Agentic API
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info,extrag_core=debug,rag=debug,api=debug
      - QDRANT_BASE_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=nomic-embed-text:latest
      - WEB_DIR=/app/web
      - SQLITE_DB_PATH=/app/data/extrag_state.db
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data
      - /Volumes/Datra:/Volumes/Datra:ro

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

# We assume Ollama ('nomic-embed-text:latest') is running natively on the host 
# at http://host.docker.internal:11434 rather than containerized, 
# for better GPU utilization, but it can be containerized here if needed.

volumes:
  qdrant_storage:
